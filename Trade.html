<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoGrade Pro - Đầy đủ tính năng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .btn-active-tf { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; }
    </style>
</head>
<body>

    <header class="bg-white/80 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="navigate('home')">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg">
                    <i data-lucide="brain-circuit" class="w-6 h-6"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tight">AutoGrade<span class="text-indigo-600">Master</span></span>
            </div>
            <button onclick="navigate('home')" id="nav-home" class="p-2 rounded-xl hover:bg-slate-100 transition text-slate-500">
                <i data-lucide="home" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

    <main id="app" class="max-w-4xl mx-auto py-8 px-4"></main>

    <script>
        let state = {
            view: 'home',
            sets: JSON.parse(localStorage.getItem('ag_v7_sets')) || [],
            activeSession: null,
            error: ''
        };

        const save = () => localStorage.setItem('ag_v7_sets', JSON.stringify(state.sets));
        const navigate = (view) => { state.view = view; state.error = ''; render(); };

        // --- BỘ LỌC DỮ LIỆU ĐA NĂNG (TỰ LUẬN + TRẮC NGHIỆM + ĐÚNG/SAI) ---
        const parseContent = (text) => {
            const blocks = text.split(/(?=\s*Hỏi:)/i).filter(b => b.trim().length > 0);
            
            return blocks.map(block => {
                const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                let q = '', type = 'essay', note = '', a = '', options = {};

                lines.forEach(line => {
                    const low = line.toLowerCase();
                    if (low.startsWith('hỏi:')) {
                        q = line.substring(4).trim();
                    } else if (low.startsWith('a:')) {
                        options.A = line.substring(2).trim();
                    } else if (low.startsWith('b:')) {
                        options.B = line.substring(2).trim();
                    } else if (low.startsWith('c:')) {
                        options.C = line.substring(2).trim();
                    } else if (low.startsWith('d:')) {
                        options.D = line.substring(2).trim();
                    } else if (low.startsWith('đúng sai:')) {
                        type = 'tf_multi';
                        const tfMap = {};
                        line.substring(9).split(',').forEach(p => {
                            const [k, v] = p.split('-').map(x => x.trim().toUpperCase());
                            if (k && v) tfMap[k] = v;
                        });
                        a = tfMap;
                    } else if (low.startsWith('đáp án:')) {
                        a = line.substring(7).trim().toUpperCase();
                        type = 'quiz';
                    } else if (low.startsWith('đáp:')) {
                        a = line.substring(4).trim();
                        type = 'essay';
                    } else if (low.startsWith('ghi chú:')) {
                        note = line.substring(8).trim();
                    }
                });

                // Nếu có options nhưng chưa xác định type là tf_multi thì mặc định là quiz
                if (Object.keys(options).length > 0 && type !== 'tf_multi') type = 'quiz';

                return { q, a, options, type, note };
            }).filter(item => item.q !== '');
        };

        const render = () => {
            const container = document.getElementById('app');
            if (state.view === 'home') container.innerHTML = viewHome();
            else if (state.view === 'create') container.innerHTML = viewCreate();
            else if (state.view === 'practice') container.innerHTML = viewPractice();
            else if (state.view === 'result') container.innerHTML = viewResult();
            lucide.createIcons();
        };

        const viewHome = () => `
            <div class="animate-in">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-3xl font-black">Bài tập của tôi</h1>
                    <button onclick="navigate('create')" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition">Thêm mới</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${state.sets.map(s => `
                        <div class="glass-card p-6 rounded-[2rem] hover:shadow-md transition-all">
                            <h3 class="text-xl font-bold mb-2 line-clamp-1">${s.title}</h3>
                            <p class="text-slate-400 text-sm font-bold mb-6 uppercase tracking-wider">${s.questions.length} Câu hỏi</p>
                            <div class="flex gap-2">
                                <button onclick="startSession(${s.id})" class="flex-1 py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-black transition">Ôn tập</button>
                                <button onclick="deleteSet(${s.id})" class="p-3 text-rose-500 bg-rose-50 rounded-xl hover:bg-rose-100 transition"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                            </div>
                        </div>
                    `).join('') || '<div class="col-span-full py-16 text-center text-slate-400 font-bold border-2 border-dashed border-slate-200 rounded-[2rem]">Chưa có dữ liệu</div>'}
                </div>
            </div>
        `;

        const viewCreate = () => `
            <div class="max-w-2xl mx-auto animate-in">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                    <h2 class="text-2xl font-black mb-6">Thêm bộ câu hỏi mới</h2>
                    <input id="c-title" class="w-full px-6 py-4 rounded-2xl border mb-4 outline-none focus:ring-4 focus:ring-indigo-50" placeholder="Tên bộ đề (VD: Sử Lớp 10)...">
                    <div class="mb-4 p-4 bg-indigo-50 rounded-2xl text-[11px] font-bold text-indigo-700 space-y-1">
                        <p>● Tự luận: Hỏi: ... Đáp: ...</p>
                        <p>● Trắc nghiệm: Hỏi: ... A: ... B: ... Đáp án: A</p>
                        <p>● Đúng/Sai: Hỏi: ... A: ... B: ... Đúng sai: A-Đ, B-S</p>
                    </div>
                    <textarea id="c-content" rows="10" class="w-full px-6 py-4 rounded-2xl border mb-6 font-mono text-sm outline-none focus:ring-4 focus:ring-indigo-50" placeholder="Hỏi: Thủ đô Việt Nam là gì?\nĐáp: Hà Nội"></textarea>
                    <div class="flex gap-4">
                        <button onclick="navigate('home')" class="flex-1 font-bold text-slate-400">Hủy</button>
                        <button onclick="handleSave()" class="flex-[2] py-4 rounded-2xl bg-indigo-600 text-white font-black shadow-lg">Lưu vào thư viện</button>
                    </div>
                </div>
            </div>
        `;

        const viewPractice = () => {
            const sess = state.activeSession;
            const q = sess.questions[sess.currentIndex];
            return `
                <div class="max-w-2xl mx-auto animate-in">
                    <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100 min-h-[400px] flex flex-col">
                        <div class="flex justify-between items-center mb-8">
                            <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-[10px] font-black uppercase tracking-widest">Câu ${sess.currentIndex + 1} / ${sess.questions.length}</span>
                            <span class="text-[10px] font-bold text-slate-300 uppercase">${q.type === 'tf_multi' ? 'Đúng/Sai' : q.type === 'quiz' ? 'Trắc nghiệm' : 'Tự luận'}</span>
                        </div>
                        
                        <h2 class="text-2xl font-bold mb-10 text-slate-800 leading-relaxed">${q.q}</h2>
                        
                        <div class="flex-1">
                            ${q.type === 'essay' ? `
                                <textarea id="ans-essay" class="w-full p-6 rounded-2xl border-2 border-slate-100 outline-none focus:border-indigo-500 text-xl bg-slate-50 transition-all" rows="4" placeholder="Nhập câu trả lời của bạn..."></textarea>
                                <button onclick="submitEssay()" class="w-full mt-6 py-5 bg-indigo-600 text-white rounded-2xl font-black text-lg shadow-lg shadow-indigo-100">Xác nhận</button>
                            ` : q.type === 'quiz' ? `
                                <div class="grid gap-3">
                                    ${['A','B','C','D'].map(k => q.options[k] ? `
                                        <button onclick="submitQuiz('${k}')" class="p-5 rounded-2xl border-2 border-slate-100 text-left font-bold hover:border-indigo-500 hover:bg-indigo-50 transition-all flex items-center gap-4">
                                            <span class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-400 group-hover:bg-indigo-600 group-hover:text-white transition-all">${k}</span>
                                            ${q.options[k]}
                                        </button>
                                    ` : '').join('')}
                                </div>
                            ` : `
                                <div class="space-y-4">
                                    ${['A','B','C','D'].map(k => q.options[k] ? `
                                        <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                            <span class="font-bold text-slate-700">${k}. ${q.options[k]}</span>
                                            <div class="flex gap-2 bg-white p-1 rounded-xl shadow-sm border border-slate-100">
                                                <button onclick="markTf('${k}','Đ')" id="btn-${k}-D" class="px-5 py-2 rounded-lg font-black text-sm transition-all text-slate-300">ĐÚNG</button>
                                                <button onclick="markTf('${k}','S')" id="btn-${k}-S" class="px-5 py-2 rounded-lg font-black text-sm transition-all text-slate-300">SAI</button>
                                            </div>
                                        </div>
                                    ` : '').join('')}
                                    <button onclick="submitTfMulti()" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-lg mt-6 shadow-lg shadow-indigo-100">Xác nhận câu này</button>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
        };

        const viewResult = () => {
            const sess = state.activeSession;
            const correct = sess.results.filter(r => r.isCorrect).length;
            const score = Math.round((correct / sess.questions.length) * 100);
            
            return `
                <div class="max-w-3xl mx-auto animate-in">
                    <div class="bg-white p-12 rounded-[4rem] shadow-xl text-center mb-10 border border-slate-100">
                        <h2 class="text-7xl font-black mb-4 ${score >= 50 ? 'text-emerald-600' : 'text-rose-600'}">${score}%</h2>
                        <p class="text-slate-400 font-bold uppercase tracking-widest text-sm mb-10">Đúng ${correct}/${sess.questions.length} câu</p>
                        <button onclick="navigate('home')" class="px-12 py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-black transition">Quay về</button>
                    </div>
                    <div class="space-y-4">
                        ${sess.results.map((r, i) => `
                            <div class="bg-white p-6 rounded-[2rem] border-l-[12px] ${r.isCorrect ? 'border-emerald-500' : 'border-rose-500'} shadow-sm">
                                <h4 class="font-bold text-lg mb-4">${i+1}. ${r.q}</h4>
                                <div class="grid grid-cols-2 gap-4 text-sm">
                                    <div class="p-3 bg-slate-50 rounded-xl">
                                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Bạn chọn</p>
                                        <p class="font-bold ${r.isCorrect ? 'text-emerald-600' : 'text-rose-600'}">${typeof r.userA === 'object' ? JSON.stringify(r.userA) : r.userA}</p>
                                    </div>
                                    <div class="p-3 bg-indigo-50 rounded-xl">
                                        <p class="text-[10px] font-black text-indigo-400 uppercase mb-1">Đáp án</p>
                                        <p class="font-bold text-indigo-600">${typeof r.a === 'object' ? JSON.stringify(r.a) : r.a}</p>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        };

        // --- XỬ LÝ LOGIC ---
        let currentTfSelection = {};

        const handleSave = () => {
            const title = document.getElementById('c-title').value.trim();
            const content = document.getElementById('c-content').value.trim();
            if (!title || !content) return;
            const questions = parseContent(content);
            state.sets.push({ id: Date.now(), title, questions });
            save(); navigate('home');
        };

        const deleteSet = (id) => { if(confirm('Xóa?')) { state.sets = state.sets.filter(x => x.id != id); save(); render(); } };

        const startSession = (id) => {
            const s = state.sets.find(x => x.id == id);
            state.activeSession = { questions: [...s.questions], currentIndex: 0, results: [] };
            currentTfSelection = {};
            navigate('practice');
        };

        const submitQuiz = (val) => {
            const q = state.activeSession.questions[state.activeSession.currentIndex];
            state.activeSession.results.push({ ...q, userA: val, isCorrect: val === q.a });
            next();
        };

        const submitEssay = () => {
            const val = document.getElementById('ans-essay').value.trim();
            const q = state.activeSession.questions[state.activeSession.currentIndex];
            const clean = (s) => s.toLowerCase().replace(/\s+/g, '');
            const isCorrect = clean(val) === clean(q.a);
            state.activeSession.results.push({ ...q, userA: val, isCorrect });
            next();
        };

        const markTf = (k, v) => {
            currentTfSelection[k] = v;
            ['Đ', 'S'].forEach(opt => {
                const btn = document.getElementById(`btn-${k}-${opt === 'Đ' ? 'D' : 'S'}`);
                if (opt === v) {
                    btn.className = `px-5 py-2 rounded-lg font-black text-sm transition-all ${v === 'Đ' ? 'bg-emerald-500 text-white shadow-lg' : 'bg-rose-500 text-white shadow-lg'}`;
                } else {
                    btn.className = "px-5 py-2 rounded-lg font-black text-sm transition-all text-slate-300";
                }
            });
        };

        const submitTfMulti = () => {
            const q = state.activeSession.questions[state.activeSession.currentIndex];
            let isCorrect = true;
            Object.keys(q.a).forEach(k => { if (currentTfSelection[k] !== q.a[k]) isCorrect = false; });
            if (Object.keys(currentTfSelection).length < Object.keys(q.a).length) isCorrect = false;
            state.activeSession.results.push({ ...q, userA: {...currentTfSelection}, isCorrect });
            currentTfSelection = {};
            next();
        };

        const next = () => {
            if (state.activeSession.currentIndex < state.activeSession.questions.length - 1) {
                state.activeSession.currentIndex++; render();
            } else navigate('result');
        };

        render();
    </script>
</body>
</html>
