
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRZ ANALYZER TERMINAL v2</title>
    <style>
        :root {
            --matrix-green: #0f0;
            --dark-green: #003300;
            --bg-color: #050505;
            --glow: 0 0 10px #0f0, 0 0 20px #0f0;
            --font-main: 'Consolas', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            background-color: var(--bg-color);
            color: var(--matrix-green);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* CRT Effect & Scanlines */
        .crt::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .crt::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: rgba(0, 255, 0, 0.02);
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 1;
            position: fixed;
            pointer-events: none;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,255,0,0.1) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            animation: scan 6s linear infinite;
        }

        /* Container & Layout */
        .terminal-container {
            position: relative;
            z-index: 3;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: var(--glow);
            animation: text-glitch 3s infinite;
        }

        /* Mode Switcher */
        .mode-switcher {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px dashed var(--matrix-green);
            padding-bottom: 15px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid var(--matrix-green);
            background: transparent;
            color: var(--matrix-green);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--matrix-green);
            color: var(--bg-color);
            box-shadow: var(--glow);
            font-weight: bold;
        }

        /* Form Layout */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }
        .input-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        input, select, textarea, button {
            background: transparent;
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            font-family: var(--font-main);
            padding: 10px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        textarea {
            resize: vertical;
            line-height: 1.5;
            letter-spacing: 1px;
        }

        ::-webkit-calendar-picker-indicator {
            filter: invert(1) sepia(100%) saturate(10000%) hue-rotate(80deg);
            cursor: pointer;
        }

        input:focus, select:focus, textarea:focus {
            box-shadow: inset 0 0 5px var(--matrix-green), 0 0 5px var(--matrix-green);
            background: rgba(0, 255, 0, 0.05);
        }

        button {
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover:not(.active) {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 5px var(--matrix-green);
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-action {
            grid-column: 1 / -1;
            padding: 15px;
            font-size: 1.2rem;
            margin-top: 10px;
            background: rgba(0, 255, 0, 0.1);
        }
        .btn-action:hover {
            background: var(--matrix-green);
            color: var(--bg-color);
        }

        /* Output Area */
        .output-area {
            flex-grow: 1;
            border: 1px solid var(--dark-green);
            background: #020a02;
            padding: 20px;
            min-height: 250px;
            position: relative;
            overflow-y: auto;
        }

        .mrz-block, .info-block {
            margin-top: 20px;
            border: 1px dashed var(--matrix-green);
            padding: 15px;
            background: rgba(0, 255, 0, 0.03);
            text-shadow: 0 0 2px var(--matrix-green);
            word-break: break-all;
        }

        .info-block div {
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .mrz-line {
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin: 5px 0;
            white-space: pre-wrap;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .action-buttons button {
            flex: 1;
            font-size: 0.9rem;
            padding: 10px;
        }

        .hidden { display: none !important; }
        .blink { animation: blinker 1s linear infinite; }

        /* Animations */
        @keyframes blinker { 50% { opacity: 0; } }
        @keyframes scan { 0% { top: -100px; } 100% { top: 100vh; } }
        @keyframes flicker { 0% { opacity: 0.02; } 50% { opacity: 0.05; } 100% { opacity: 0.02; } }
        @keyframes text-glitch {
            0% { text-shadow: var(--glow); }
            20% { text-shadow: 2px 0 0 red, -2px 0 0 blue; }
            21% { text-shadow: var(--glow); }
            60% { text-shadow: var(--glow); }
            61% { text-shadow: -2px 0 0 red, 2px 0 0 blue; }
            62% { text-shadow: var(--glow); }
            100% { text-shadow: var(--glow); }
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; gap: 15px; }
            .action-buttons { flex-direction: column; }
            header { font-size: 1.5rem; }
            .mrz-line { font-size: 1rem; letter-spacing: 1px; }
            .mode-switcher { flex-direction: column; }
        }
    </style>
</head>
<body class="crt">
    <div class="scanline"></div>
    
    <div class="terminal-container">
        <header>MRZ ANALYZER TERMINAL</header>

        <!-- Mode Switcher -->
        <div class="mode-switcher">
            <button class="mode-btn active" id="btn-mode1" onclick="switchMode(1)">[ MODE 1: INFO -> MRZ ]</button>
            <button class="mode-btn" id="btn-mode2" onclick="switchMode(2)">[ MODE 2: MRZ -> INFO ]</button>
        </div>

        <!-- ================= MODE 1: GENERATE ================= -->
        <div id="section-mode1">
            <div class="form-grid">
                <div class="input-group full-width">
                    <label>> SỐ CCCD [12 DIGITS]</label>
                    <input type="text" id="cccd" maxlength="12" placeholder="Nhập 12 số CCCD" autocomplete="off">
                </div>

                <div class="input-group full-width">
                    <label>> HỌ VÀ TÊN ĐẦY ĐỦ</label>
                    <input type="text" id="fullname" placeholder="VD: NGUYỄN VĂN BÌNH" autocomplete="off">
                </div>

                <div class="input-group">
                    <label>> NGÀY SINH [DOB]</label>
                    <input type="date" id="dob">
                </div>

                <div class="input-group">
                    <label>> GIỚI TÍNH [GENDER]</label>
                    <select id="gender">
                        <option value="M">NAM (M)</option>
                        <option value="F">NỮ (F)</option>
                    </select>
                </div>

                <div class="input-group full-width">
                    <label>> NGÀY HẾT HẠN [EXPIRY] (Tự động +25 năm)</label>
                    <input type="date" id="expiry">
                </div>

                <button class="btn-action" onclick="startGeneration()">
                    > GENERATE_MRZ <span class="blink">_</span>
                </button>
            </div>
        </div>

        <!-- ================= MODE 2: DECODE ================= -->
        <div id="section-mode2" class="hidden">
            <div class="form-grid">
                <div class="input-group full-width">
                    <label>> INPUT MRZ DATA [DÁN 3 DÒNG MRZ VÀO ĐÂY]</label>
                    <textarea id="mrz-input" rows="4" placeholder="IDVNMxxxxxxxxxxxxxxxxxxxxx<<9&#10;xxxxxxFxxxxxxVNM<<<<<<<<<<8&#10;NGUYEN<<VAN<BINH<<<<<<<<<<<<"></textarea>
                </div>

                <button class="btn-action" onclick="startDecoding()">
                    > DECODE_DATA <span class="blink">_</span>
                </button>
            </div>
        </div>

        <!-- ================= TERMINAL OUTPUT ================= -->
        <div class="output-area" id="terminal-screen">
            <div id="terminal-logs">
                <div>> SYSTEM READY. WAITING FOR INPUT...</div>
            </div>
            
            <!-- Output Container for Mode 1 -->
            <div id="mrz-output" class="hidden">
                <div class="mrz-block">
                    <div style="color: #fff;">========== GENERATED MRZ ==========</div><br>
                    <div id="mrz-l1" class="mrz-line"></div>
                    <div id="mrz-l2" class="mrz-line"></div>
                    <div id="mrz-l3" class="mrz-line"></div><br>
                    <div style="color: #fff;">===================================</div>
                </div>

                <div class="action-buttons">
                    <button onclick="copyData('mrz')">[ COPY MRZ ]</button>
                    <button onclick="clearTerminal()">[ CLEAR DATA ]</button>
                    <button onclick="exportTXT('mrz')">[ EXPORT TXT ]</button>
                </div>
            </div>

            <!-- Output Container for Mode 2 -->
            <div id="info-output" class="hidden">
                <div class="info-block">
                    <div style="color: #fff;">========== DECODED INFO ==========</div><br>
                    <div id="dec-cccd">> SỐ CCCD : </div>
                    <div id="dec-name">> HỌ TÊN  : </div>
                    <div id="dec-dob">> NGÀY SINH: </div>
                    <div id="dec-gender">> GIỚI TÍNH: </div>
                    <div id="dec-exp">> HẾT HẠN  : </div><br>
                    <div style="color: #fff;">==================================</div>
                </div>

                <div class="action-buttons">
                    <button onclick="copyData('info')">[ COPY INFO ]</button>
                    <button onclick="clearTerminal()">[ CLEAR DATA ]</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================= UI CONTROL & UTILS =================

        let currentMode = 1;

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btn-mode1').classList.toggle('active', mode === 1);
            document.getElementById('btn-mode2').classList.toggle('active', mode === 2);
            
            document.getElementById('section-mode1').classList.toggle('hidden', mode !== 1);
            document.getElementById('section-mode2').classList.toggle('hidden', mode !== 2);

            clearTerminal();
        }

        function scrollToBottom() {
            const screen = document.getElementById('terminal-screen');
            screen.scrollTop = screen.scrollHeight;
        }

        function clearTerminal() {
            document.getElementById('mrz-output').classList.add('hidden');
            document.getElementById('info-output').classList.add('hidden');
            document.getElementById('terminal-logs').innerHTML = `<div>> SYSTEM READY [MODE ${currentMode}]. WAITING FOR INPUT...</div>`;
            
            if (currentMode === 1) {
                document.getElementById('cccd').value = '';
                document.getElementById('fullname').value = '';
                document.getElementById('dob').value = '';
                document.getElementById('expiry').value = '';
                document.getElementById('gender').value = 'M';
            } else {
                document.getElementById('mrz-input').value = '';
            }
        }

        // Tự động tính ngày hết hạn (DOB + 25 năm)
        document.getElementById('dob').addEventListener('change', function() {
            const dobVal = this.value;
            if (dobVal) {
                const parts = dobVal.split('-'); // YYYY-MM-DD
                if (parts.length === 3) {
                    const year = parseInt(parts[0], 10);
                    const expiryYear = year + 25;
                    const expiryDate = `${expiryYear}-${parts[1]}-${parts[2]}`;
                    document.getElementById('expiry').value = expiryDate;
                }
            }
        });

        function removeVietnameseTones(str) {
            str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
            str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
            str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
            str = str.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
            str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
            str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
            str = str.replace(/đ/g, "d");
            str = str.replace(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
            str = str.replace(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
            str = str.replace(/Ì|Í|Ị|Ỉ|Ĩ/g, "I");
            str = str.replace(/Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "O");
            str = str.replace(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
            str = str.replace(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
            str = str.replace(/Đ/g, "D");
            return str;
        }

        // YYMMDD to YYYY-MM-DD
        function parseYYMMDD(yymmdd, isDOB) {
            const yy = parseInt(yymmdd.substring(0, 2), 10);
            const mm = yymmdd.substring(2, 4);
            const dd = yymmdd.substring(4, 6);
            
            const currentYear = new Date().getFullYear();
            const currentYY = currentYear % 100;
            
            let year = 2000 + yy;
            
            // Logic thế kỷ:
            // Nếu là ngày sinh và (2000 + yy) > năm hiện tại -> chắc chắn sinh năm 19xx
            if (isDOB && year > currentYear) {
                year = 1900 + yy;
            }

            return `${year}-${mm}-${dd}`;
        }

        function formatDisplayDate(yyyy_mm_dd) {
            const p = yyyy_mm_dd.split('-');
            return `${p[2]}/${p[1]}/${p[0]}`;
        }


        // ================= MODE 1: ENCODE LOGIC =================
        function startGeneration() {
            const cccd = document.getElementById('cccd').value.trim();
            const fullname = document.getElementById('fullname').value.trim();
            const dob = document.getElementById('dob').value;
            const expiry = document.getElementById('expiry').value;

            const logs = document.getElementById('terminal-logs');
            const output = document.getElementById('mrz-output');
            
            if(!cccd || !fullname || !dob || !expiry) {
                logs.innerHTML += `<div style="color: red">> [ERROR] MISSING INPUT DATA. ABORTING...</div>`;
                scrollToBottom();
                return;
            }

            output.classList.add('hidden');
            document.getElementById('info-output').classList.add('hidden');
            logs.innerHTML = `<div>> INITIALIZING MRZ ENCODER...</div>`;
            
            const sequence = [
                "> PARSING BIOMETRIC DATA...",
                "> ENCODING LINE 1...",
                "> ENCODING LINE 2...",
                "> ENCODING LINE 3...",
                "> ENCRYPTION COMPLETE. RENDERING..."
            ];

            let delay = 0;
            sequence.forEach((text, index) => {
                setTimeout(() => {
                    logs.innerHTML += `<div>${text}</div>`;
                    scrollToBottom();
                    if (index === sequence.length - 1) setTimeout(() => buildMRZ(), 400);
                }, delay);
                delay += 300;
            });
        }

        function buildMRZ() {
            const cccd = document.getElementById('cccd').value.trim();
            const fullname = document.getElementById('fullname').value.trim();
            const dob = document.getElementById('dob').value;
            const gender = document.getElementById('gender').value;
            const expiry = document.getElementById('expiry').value;

            // Line 1: IDVNM + [CCCD] + [8 chars CCCD] + <<9
            const cccdFirst8 = cccd.substring(0, 8).padEnd(8, '<');
            const line1 = `IDVNM${cccd}${cccdFirst8}<<9`;

            // Line 2: YYMMDD + G + YYMMDD + VNM<<<<<<<<<<8
            const dParts = dob.split('-');
            const eParts = expiry.split('-');
            const dobYYMMDD = dParts[0].substring(2) + dParts[1] + dParts[2];
            const expYYMMDD = eParts[0].substring(2) + eParts[1] + eParts[2];
            
            const line2 = `${dobYYMMDD}${gender}${expYYMMDD}VNM<<<<<<<<<<8`;

            // Line 3: HỌ<<TÊN_ĐỆM<TÊN
            let cleanName = removeVietnameseTones(fullname).toUpperCase().trim().replace(/\s+/g, ' ');
            let parts = cleanName.split(' ');
            let line3 = "";
            if (parts.length >= 2) {
                line3 = parts[0] + "<<" + parts.slice(1).join('<');
            } else {
                line3 = parts[0] || "";
            }
            while (line3.length < 30) line3 += "<";
            line3 = line3.substring(0, 30);

            document.getElementById('mrz-l1').innerText = line1;
            document.getElementById('mrz-l2').innerText = line2;
            document.getElementById('mrz-l3').innerText = line3;
            
            document.getElementById('mrz-output').classList.remove('hidden');
            scrollToBottom();
        }

        // ================= MODE 2: DECODE LOGIC =================
        function startDecoding() {
            const rawInput = document.getElementById('mrz-input').value.trim();
            const logs = document.getElementById('terminal-logs');
            const output = document.getElementById('info-output');

            const lines = rawInput.split('\n').map(l => l.trim()).filter(l => l.length > 0);

            if (lines.length !== 3) {
                logs.innerHTML += `<div style="color: red">> [ERROR] INVALID MRZ FORMAT. EXPECTED 3 LINES, FOUND ${lines.length}.</div>`;
                scrollToBottom();
                return;
            }

            output.classList.add('hidden');
            document.getElementById('mrz-output').classList.add('hidden');
            logs.innerHTML = `<div>> INITIALIZING DECODER...</div>`;

            const sequence = [
                "> ANALYZING MRZ SIGNATURE...",
                "> EXTRACTING ID VECTOR...",
                "> DECODING DATES & GENDER...",
                "> RECONSTRUCTING NAME...",
                "> DECRYPTION SUCCESSFUL."
            ];

            let delay = 0;
            sequence.forEach((text, index) => {
                setTimeout(() => {
                    logs.innerHTML += `<div>${text}</div>`;
                    scrollToBottom();
                    if (index === sequence.length - 1) setTimeout(() => processDecode(lines), 400);
                }, delay);
                delay += 300;
            });
        }

        function processDecode(lines) {
            const l1 = lines[0];
            const l2 = lines[1];
            const l3 = lines[2];

            try {
                // Line 1 Decode: IDVNMxxxxxxxxxxxx
                const cccd = l1.substring(5, 17).replace(/</g, '');

                // Line 2 Decode: YYMMDD(DOB) + G + YYMMDD(EXP)
                const dobStr = parseYYMMDD(l2.substring(0, 6), true);
                const genderChar = l2.substring(6, 7);
                const gender = genderChar === 'F' ? 'NỮ' : (genderChar === 'M' ? 'NAM' : 'UNKNOWN');
                const expStr = parseYYMMDD(l2.substring(7, 13), false);

                // Line 3 Decode: HỌ<<TÊN_ĐỆM<TÊN
                let rawName = l3.replace(/<+$/g, ''); // Xóa < ở cuối
                let nameParts = rawName.split('<<');
                let fullName = "";
                
                if (nameParts.length === 2) {
                    let ho = nameParts[0];
                    let ten = nameParts[1].replace(/</g, ' ');
                    fullName = ho + ' ' + ten;
                } else {
                    fullName = rawName.replace(/</g, ' ');
                }

                // Render result
                document.getElementById('dec-cccd').innerText = `> SỐ CCCD : ${cccd}`;
                document.getElementById('dec-name').innerText = `> HỌ TÊN  : ${fullName}`;
                document.getElementById('dec-dob').innerText =  `> NGÀY SINH: ${formatDisplayDate(dobStr)}`;
                document.getElementById('dec-gender').innerText = `> GIỚI TÍNH: ${gender}`;
                document.getElementById('dec-exp').innerText =  `> HẾT HẠN  : ${formatDisplayDate(expStr)}`;

                document.getElementById('info-output').classList.remove('hidden');
                scrollToBottom();

            } catch (err) {
                const logs = document.getElementById('terminal-logs');
                logs.innerHTML += `<div style="color: red">> [FATAL ERROR] CORRUPTED MRZ DATA. CANNOT DECODE.</div>`;
                scrollToBottom();
            }
        }

        // ================= ACTIONS =================
        function copyData(type) {
            let text = "";
            if (type === 'mrz') {
                text = document.getElementById('mrz-l1').innerText + '\n' +
                       document.getElementById('mrz-l2').innerText + '\n' +
                       document.getElementById('mrz-l3').innerText;
            } else {
                text = document.getElementById('dec-cccd').innerText + '\n' +
                       document.getElementById('dec-name').innerText + '\n' +
                       document.getElementById('dec-dob').innerText + '\n' +
                       document.getElementById('dec-gender').innerText + '\n' +
                       document.getElementById('dec-exp').innerText;
            }
            
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);

            const logs = document.getElementById('terminal-logs');
            logs.innerHTML += `<div>> [SYS] DATA COPIED TO CLIPBOARD.</div>`;
            scrollToBottom();
        }

        function exportTXT() {
            const l1 = document.getElementById('mrz-l1').innerText;
            const l2 = document.getElementById('mrz-l2').innerText;
            const l3 = document.getElementById('mrz-l3').innerText;
            const mrzText = `========== GENERATED MRZ ==========\r\n${l1}\r\n${l2}\r\n${l3}\r\n===================================`;
            
            const blob = new Blob([mrzText], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `MRZ_EXPORT_${new Date().getTime()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            const logs = document.getElementById('terminal-logs');
            logs.innerHTML += `<div>> [SYS] MRZ DATA EXPORTED SUCCESSFULLY.</div>`;
            scrollToBottom();
        }
    </script>
</body>
</html>
