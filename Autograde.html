<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoGrade Ultimate - Thi Thực Tế</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">

    <header class="bg-white/70 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="navigate('home')">
                <div class="bg-violet-600 p-1.5 rounded-xl text-white shadow-lg shadow-violet-200">
                    <i data-lucide="award" class="w-6 h-6"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tight">AutoGrade<span class="text-violet-600">Ultimate</span></span>
            </div>
            <nav class="flex items-center gap-1">
                <button onclick="navigate('home')" id="nav-home" class="px-4 py-2 rounded-xl transition font-bold flex items-center gap-2">
                    <i data-lucide="home" class="w-4 h-4"></i> <span class="hidden sm:inline">Trang chủ</span>
                </button>
                <button onclick="navigate('exam-setup')" id="nav-exam" class="px-4 py-2 rounded-xl transition font-bold flex items-center gap-2">
                    <i data-lucide="timer" class="w-4 h-4"></i> <span class="hidden sm:inline">Thi thực tế</span>
                </button>
                <button onclick="navigate('notes')" id="nav-notes" class="px-4 py-2 rounded-xl transition font-bold flex items-center gap-2">
                    <i data-lucide="pen-tool" class="w-4 h-4"></i> <span class="hidden sm:inline">Sổ tay</span>
                </button>
            </nav>
        </div>
    </header>

    <main id="main-content" class="max-w-5xl mx-auto py-8 px-4"></main>

    <script>
        // --- STATE MANAGEMENT ---
        let appState = {
            view: 'home',
            sets: JSON.parse(localStorage.getItem('ug_sets')) || [],
            notes: localStorage.getItem('ug_notes') || '',
            activeSession: null, // { questions: [], currentIndex: 0, results: [], isExam: false }
            error: '',
            examConfig: { setId: '', essayCount: 0, quizCount: 0 }
        };

        const saveLocal = () => {
            localStorage.setItem('ug_sets', JSON.stringify(appState.sets));
            localStorage.setItem('ug_notes', appState.notes);
        };

        const navigate = (view) => {
            appState.view = view;
            appState.error = '';
            render();
        };

        // --- CORE ALGORITHMS ---
        const clean = (s) => s ? s.toLowerCase().replace(/\s+/g, '').replace(/[.,?!;:]+$/, '') : "";
        const checkCorrect = (u, a, type) => type === 'essay' ? clean(u) === clean(a) : u === a;
        const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

        // --- COMPONENT RENDERING ---
        const render = () => {
            const container = document.getElementById('main-content');
            
            // Update Nav UI
            ['home', 'exam-setup', 'notes'].forEach(v => {
                const el = document.getElementById('nav-' + (v === 'exam-setup' ? 'exam' : v));
                if (el) el.className = `px-4 py-2 rounded-xl transition font-bold flex items-center gap-2 ${appState.view === v ? 'bg-violet-50 text-violet-600' : 'text-slate-500 hover:bg-slate-100'}`;
            });

            switch(appState.view) {
                case 'home': container.innerHTML = viewHome(); break;
                case 'create': container.innerHTML = viewCreate(); break;
                case 'exam-setup': container.innerHTML = viewExamSetup(); break;
                case 'practice': container.innerHTML = viewPractice(); break;
                case 'result': container.innerHTML = viewResult(); break;
                case 'notes': container.innerHTML = viewNotes(); break;
            }
            lucide.createIcons();
        };

        const viewHome = () => `
            <div class="animate-fade">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-10">
                    <div>
                        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Thư viện bài tập</h1>
                        <p class="text-slate-500 font-medium">Chào mừng bạn, hãy chọn một bộ đề để ôn luyện.</p>
                    </div>
                    <button onclick="navigate('create')" class="w-full sm:w-auto bg-slate-900 text-white px-6 py-3.5 rounded-2xl font-bold flex items-center justify-center gap-2 hover:bg-black transition shadow-xl shadow-slate-200">
                        <i data-lucide="plus-circle" class="w-5 h-5"></i> Thêm bài học mới
                    </button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${appState.sets.map(set => {
                        const essayCount = set.questions.filter(q => q.type === 'essay').length;
                        const quizCount = set.questions.filter(q => q.type === 'quiz').length;
                        return `
                        <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm hover:shadow-xl transition-all group relative">
                            <button onclick="deleteSet(${set.id})" class="absolute top-4 right-4 text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition">
                                <i data-lucide="x-circle" class="w-5 h-5"></i>
                            </button>
                            <div class="mb-4 inline-flex p-3 rounded-2xl bg-violet-50 text-violet-600">
                                <i data-lucide="book-open"></i>
                            </div>
                            <h3 class="text-xl font-extrabold mb-1 truncate pr-8">${set.title}</h3>
                            <div class="flex gap-3 text-[10px] font-black uppercase tracking-widest text-slate-400 mb-6">
                                <span>${essayCount} Tự luận</span>
                                <span>•</span>
                                <span>${quizCount} Trắc nghiệm</span>
                            </div>
                            <div class="grid grid-cols-1 gap-2">
                                <button onclick="startStandard('${set.id}')" class="w-full py-3 rounded-xl bg-violet-600 text-white font-bold hover:bg-violet-700 transition">Ôn tập tất cả</button>
                            </div>
                        </div>
                    `}).join('') || `<div class="col-span-full py-24 text-center bg-white rounded-[3rem] border-2 border-dashed border-slate-200 text-slate-400 font-bold">Bạn chưa có bài học nào.</div>`}
                </div>
            </div>
        `;

        const viewCreate = () => `
            <div class="max-w-2xl mx-auto animate-fade">
                <div class="bg-white p-8 sm:p-10 rounded-[2.5rem] shadow-2xl border border-slate-100">
                    <h2 class="text-2xl font-black mb-6">Tạo nội dung học tập</h2>
                    <div class="space-y-5">
                        <input id="create-title" class="w-full px-6 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-4 focus:ring-violet-100 transition" placeholder="Tên môn học/bài học...">
                        <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100 text-[11px] text-amber-700 font-bold leading-relaxed">
                            Mẹo: Bạn có thể nhập lẫn lộn cả 2 loại trong 1 bài tập!<br>
                            - Tự luận: Hỏi: ... Đáp: ...<br>
                            - Trắc nghiệm: Hỏi: ... A: ... B: ... C: ... D: ... Đáp án: A
                        </div>
                        <textarea id="create-content" rows="10" class="w-full px-6 py-4 rounded-2xl border border-slate-200 outline-none focus:ring-4 focus:ring-violet-100 transition font-mono text-sm" placeholder="Hỏi: Nước + Carbon dioxide\nĐáp: Axit Cacbonic\n\nHỏi: Thủ đô VN?\nA: Hà Nội | B: HCM\nĐáp án: A"></textarea>
                        ${appState.error ? `<p class="text-rose-500 text-sm font-bold">${appState.error}</p>` : ''}
                        <div class="flex gap-3 pt-2">
                            <button onclick="navigate('home')" class="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600">Hủy</button>
                            <button onclick="handleSaveSet()" class="flex-[2] py-4 rounded-2xl bg-violet-600 text-white font-black shadow-lg shadow-violet-100 hover:bg-violet-700 transition">Lưu bài học</button>
                        </div>
                    </div>
                </div>
            </div>
        `;

        const viewExamSetup = () => {
            const selectedSet = appState.sets.find(s => s.id == appState.examConfig.setId);
            const eMax = selectedSet ? selectedSet.questions.filter(q => q.type === 'essay').length : 0;
            const qMax = selectedSet ? selectedSet.questions.filter(q => q.type === 'quiz').length : 0;

            return `
            <div class="max-w-xl mx-auto animate-fade">
                <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100">
                    <div class="mb-8 text-center">
                        <div class="inline-flex p-4 bg-orange-50 text-orange-500 rounded-3xl mb-4"><i data-lucide="timer" class="w-8 h-8"></i></div>
                        <h2 class="text-3xl font-black">Thi thực tế</h2>
                        <p class="text-slate-400 font-medium">Cấu hình đề thi ngẫu nhiên của bạn</p>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2">Chọn bộ bài tập</label>
                            <select onchange="appState.examConfig.setId = this.value; render();" class="w-full px-6 py-4 rounded-2xl border border-slate-200 outline-none bg-slate-50 font-bold">
                                <option value="">-- Chọn bài học --</option>
                                ${appState.sets.map(s => `<option value="${s.id}" ${appState.examConfig.setId == s.id ? 'selected' : ''}>${s.title}</option>`).join('')}
                            </select>
                        </div>

                        ${selectedSet ? `
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2 text-center">Số câu Tự luận (Max ${eMax})</label>
                                <input type="number" id="exam-e-count" min="0" max="${eMax}" value="${Math.min(appState.examConfig.essayCount || 5, eMax)}" class="w-full px-6 py-4 rounded-2xl border border-slate-200 text-center font-bold outline-none focus:border-violet-500">
                            </div>
                            <div>
                                <label class="block text-xs font-black uppercase tracking-widest text-slate-400 mb-2 text-center">Số câu Trắc nghiệm (Max ${qMax})</label>
                                <input type="number" id="exam-q-count" min="0" max="${qMax}" value="${Math.min(appState.examConfig.quizCount || 10, qMax)}" class="w-full px-6 py-4 rounded-2xl border border-slate-200 text-center font-bold outline-none focus:border-violet-500">
                            </div>
                        </div>
                        <button onclick="handleStartExam()" class="w-full py-5 rounded-3xl bg-orange-500 text-white font-black text-lg shadow-xl shadow-orange-100 hover:bg-orange-600 transition active:scale-95">Bắt đầu làm bài thi</button>
                        ` : `<p class="text-center py-10 text-slate-300 font-bold">Vui lòng chọn bộ đề trước</p>`}
                    </div>
                </div>
            </div>
            `;
        };

        const viewPractice = () => {
            const q = appState.activeSession.questions[appState.activeSession.currentIndex];
            const progress = (appState.activeSession.currentIndex / appState.activeSession.questions.length) * 100;
            
            return `
                <div class="max-w-3xl mx-auto animate-fade">
                    <div class="mb-8 flex justify-between items-end px-2">
                        <span class="text-sm font-black text-violet-600 uppercase tracking-widest">
                            ${appState.activeSession.isExam ? 'Đang thi' : 'Ôn tập'} • Câu ${appState.activeSession.currentIndex + 1}/${appState.activeSession.questions.length}
                        </span>
                        <div class="w-32 bg-slate-200 h-2 rounded-full overflow-hidden shadow-inner">
                            <div class="bg-violet-600 h-full transition-all duration-700" style="width:${progress}%"></div>
                        </div>
                    </div>

                    <div class="bg-white p-10 sm:p-14 rounded-[3.5rem] shadow-2xl border border-slate-50 relative">
                        <h2 class="text-3xl sm:text-4xl font-extrabold text-slate-800 mb-12 leading-[1.2]">${q.q}</h2>
                        
                        ${q.type === 'essay' ? `
                            <textarea id="ans-box" rows="3" class="w-full px-8 py-6 rounded-3xl border-2 border-slate-100 focus:border-violet-500 outline-none text-xl bg-slate-50 transition" placeholder="Nhập câu trả lời..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submitAns(this.value);}"></textarea>
                            <div class="mt-10 flex justify-end">
                                <button onclick="submitAns(document.getElementById('ans-box').value)" class="bg-violet-600 text-white px-12 py-5 rounded-2xl font-black text-lg hover:bg-violet-700 shadow-xl shadow-violet-200 transition active:scale-95 flex items-center gap-2">Xác nhận <i data-lucide="arrow-right"></i></button>
                            </div>
                        ` : `
                            <div class="grid grid-cols-1 gap-4">
                                ${['A', 'B', 'C', 'D'].map(k => q.options[k] ? `
                                    <button onclick="submitAns('${k}')" class="group w-full flex items-center gap-5 p-6 rounded-3xl border-2 border-slate-100 hover:border-violet-500 hover:bg-violet-50 transition text-left">
                                        <span class="w-12 h-12 rounded-2xl bg-slate-100 group-hover:bg-violet-600 group-hover:text-white flex items-center justify-center font-black text-slate-500 transition shadow-sm">${k}</span>
                                        <span class="font-bold text-slate-700 text-xl">${q.options[k]}</span>
                                    </button>
                                ` : '').join('')}
                            </div>
                        `}
                    </div>
                </div>
            `;
        };

        const viewResult = () => {
            const correct = appState.activeSession.results.filter(r => r.isCorrect).length;
            const total = appState.activeSession.results.length;
            const score = Math.round((correct / total) * 100);

            return `
                <div class="max-w-4xl mx-auto animate-fade">
                    <div class="bg-white p-12 rounded-[4rem] shadow-2xl border border-slate-100 text-center mb-10 overflow-hidden relative">
                        <div class="absolute top-0 left-0 w-full h-4 ${score >= 50 ? 'bg-green-500' : 'bg-rose-500'}"></div>
                        <h2 class="text-7xl font-black mb-4 ${score >= 50 ? 'text-green-600' : 'text-rose-600'}">${score}%</h2>
                        <p class="text-slate-400 font-bold uppercase tracking-[0.2em] text-sm mb-10">Kết quả: Đúng ${correct} trên ${total} câu</p>
                        <div class="flex flex-wrap justify-center gap-4">
                            <button onclick="navigate('home')" class="px-10 py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-black transition shadow-lg">Quay lại trang chủ</button>
                            ${appState.activeSession.isExam ? `<button onclick="navigate('exam-setup')" class="px-10 py-4 bg-orange-100 text-orange-600 rounded-2xl font-bold hover:bg-orange-200 transition">Thi lại lần nữa</button>` : ''}
                        </div>
                    </div>
                    <div class="space-y-6">
                        ${appState.activeSession.results.map((r, i) => `
                            <div class="bg-white p-8 rounded-[2.5rem] border-l-[12px] shadow-sm ${r.isCorrect ? 'border-green-500 bg-green-50/20' : 'border-rose-500 bg-rose-50/20'}">
                                <h4 class="font-extrabold text-xl text-slate-800 mb-6 flex items-center gap-3">
                                    <span class="w-8 h-8 rounded-lg bg-white flex items-center justify-center text-sm shadow-sm border border-slate-100">${i+1}</span>
                                    ${r.q}
                                </h4>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div class="bg-white/80 p-5 rounded-2xl border border-slate-100">
                                        <span class="text-[10px] font-black text-slate-400 uppercase block mb-1">Bạn trả lời</span>
                                        <span class="font-bold ${r.isCorrect ? 'text-green-600' : 'text-rose-600'}">${r.type === 'quiz' ? 'Chọn ' + r.userA : (r.userA || 'Trống')}</span>
                                    </div>
                                    <div class="bg-white/80 p-5 rounded-2xl border border-slate-100">
                                        <span class="text-[10px] font-black text-slate-400 uppercase block mb-1">Đáp án chuẩn</span>
                                        <span class="font-bold text-violet-600">${r.type === 'quiz' ? 'Đáp án ' + r.a : r.a}</span>
                                    </div>
                                </div>
                                ${r.n ? `<p class="mt-5 text-sm text-slate-500 bg-white/40 p-4 rounded-xl border border-slate-100/50 italic"><b>Ghi chú:</b> ${r.n}</p>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        };

        const viewNotes = () => `
            <div class="animate-fade h-[calc(100vh-12rem)] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-black">Sổ tay kiến thức</h2>
                    <span class="px-4 py-1.5 bg-violet-50 text-violet-600 rounded-full text-[10px] font-black uppercase border border-violet-100 shadow-sm">Cloud Sync Offline</span>
                </div>
                <div class="flex-1 bg-white rounded-[3rem] shadow-2xl border border-slate-200 p-8">
                    <textarea oninput="appState.notes = this.value; saveLocal();" class="w-full h-full outline-none text-xl text-slate-700 leading-relaxed font-medium bg-[radial-gradient(#e2e8f0_1.5px,transparent_1.5px)] [background-size:28px_28px] custom-scrollbar" placeholder="Nơi lưu giữ các kiến thức quan trọng...">${appState.notes}</textarea>
                </div>
            </div>
        `;

        // --- HANDLERS ---
        const handleSaveSet = () => {
            const title = document.getElementById('create-title').value.trim();
            const content = document.getElementById('create-content').value.trim();
            if (!title || !content) { appState.error = "Vui lòng nhập đầy đủ thông tin!"; render(); return; }

            const lines = content.split('\n');
            const questions = [];
            let q = '', a = '', n = '', opts = {}, isQuiz = false;

            lines.forEach(l => {
                const line = l.trim();
                const low = line.toLowerCase();
                if (low.startsWith('hỏi:')) {
                    if (q && (a || isQuiz)) {
                        questions.push(isQuiz ? {type:'quiz', q, options:opts, a, n} : {type:'essay', q, a, n});
                        a = ''; n = ''; opts = {}; isQuiz = false;
                    }
                    q = line.substring(4).trim();
                } else if (low.startsWith('a:')) { opts.A = line.substring(2).trim(); isQuiz = true; }
                else if (low.startsWith('b:')) { opts.B = line.substring(2).trim(); isQuiz = true; }
                else if (low.startsWith('c:')) { opts.C = line.substring(2).trim(); isQuiz = true; }
                else if (low.startsWith('d:')) { opts.D = line.substring(2).trim(); isQuiz = true; }
                else if (low.startsWith('đáp án:')) a = line.substring(7).trim().toUpperCase();
                else if (low.startsWith('đáp:')) a = line.substring(4).trim();
                else if (low.startsWith('ghi chú:')) n = line.substring(8).trim();
            });
            if (q && (a || isQuiz)) questions.push(isQuiz ? {type:'quiz', q, options:opts, a, n} : {type:'essay', q, a, n});

            if (questions.length === 0) { appState.error = "Định dạng không đúng!"; render(); return; }
            appState.sets.push({ id: Date.now(), title, questions });
            saveLocal();
            navigate('home');
        };

        const deleteSet = (id) => {
            if(confirm('Xóa bộ bài tập này?')) {
                appState.sets = appState.sets.filter(s => s.id != id);
                saveLocal();
                render();
            }
        };

        const startStandard = (setId) => {
            const set = appState.sets.find(s => s.id == setId);
            appState.activeSession = {
                questions: shuffle([...set.questions]),
                currentIndex: 0,
                results: [],
                isExam: false
            };
            navigate('practice');
        };

        const handleStartExam = () => {
            const set = appState.sets.find(s => s.id == appState.examConfig.setId);
            const eReq = parseInt(document.getElementById('exam-e-count').value) || 0;
            const qReq = parseInt(document.getElementById('exam-q-count').value) || 0;

            const essays = shuffle(set.questions.filter(q => q.type === 'essay')).slice(0, eReq);
            const quizzes = shuffle(set.questions.filter(q => q.type === 'quiz')).slice(0, qReq);

            appState.activeSession = {
                questions: shuffle([...essays, ...quizzes]),
                currentIndex: 0,
                results: [],
                isExam: true
            };
            navigate('practice');
        };

        const submitAns = (val) => {
            const q = appState.activeSession.questions[appState.activeSession.currentIndex];
            appState.activeSession.results.push({
                ...q,
                userA: val,
                isCorrect: checkCorrect(val, q.a, q.type)
            });

            if (appState.activeSession.currentIndex < appState.activeSession.questions.length - 1) {
                appState.activeSession.currentIndex++;
                render();
            } else {
                navigate('result');
            }
        };

        render();
    </script>
</body>
</html>
